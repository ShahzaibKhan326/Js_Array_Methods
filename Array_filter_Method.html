      let data = [
        { name: "shahzaib", age: 12 },
        { name: "shahzaib", age: 25 },
        { name: "jamal", age: 32 },
        { name: "shakor", age: 52 },
        { name: "almas", age: 52 },
        { name: "shumaila", age: 32 },
        { name: "asgar", age: 23 },
      ];
    
      let container = document.getElementById("container");
      let input = document.getElementById("input");

      function render(filter = "all")
    {
        container.innerHTML ="";
        let filtered = filter === "all" ? data : data.filter(item => item.name.includes(filter.toLowerCase()));

        if(filtered.length === 0)
    {
        const msg = document.createElement("p");
        msg.textContent = "Data Not found";
        container.appendChild(msg)
        return;
    }

    filtered.forEach(item => {
        const wrapper = document.createElement("div")

        const name = document.createElement("p");
        name.textContent =`Name: ${item.name}`

        const age = document.createElement("p");
        age.textContent =`Age: ${item.age}`

        wrapper.appendChild(name)
        wrapper.appendChild(age)

        container.appendChild(wrapper)
    })
    }

{

{
